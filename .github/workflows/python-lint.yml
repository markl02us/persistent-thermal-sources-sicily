name: Python compile + lint
on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'scripts/**/*.py'
      - '.github/workflows/python-lint.yml'
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'scripts/**/*.py'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: py_compile all sources
        run: |
          find src scripts -name "*.py" -not -path "*/__pycache__/*" -print0 \
            | xargs -0 python -m py_compile

      - name: ruff fast-lint (non-blocking on warnings)
        continue-on-error: true
        run: ruff check src scripts || true
