name: Tagged release with PDFs attached
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: verify pre-built PDFs are present
        run: |
          set -e
          for f in \
            dist/pdf/PHOENIX_INGV_Pack_EN.pdf \
            dist/pdf/PHOENIX_INGV_Pack_IT.pdf \
            dist/pdf/PHOENIX_EXSUM_EN.pdf \
            dist/pdf/PHOENIX_EXSUM_IT.pdf; do
            if [ ! -s "$f" ]; then
              echo "missing or empty: $f" >&2
              exit 1
            fi
            echo "ok: $f ($(stat -c%s "$f") bytes)"
          done

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/pdf/PHOENIX_INGV_Pack_EN.pdf
            dist/pdf/PHOENIX_INGV_Pack_IT.pdf
            dist/pdf/PHOENIX_EXSUM_EN.pdf
            dist/pdf/PHOENIX_EXSUM_IT.pdf
            dist/pdf/PHOENIX_INGV_Pack_v1.2_Updates_EN.pdf
            dist/pdf/PHOENIX_INGV_Pack_v1.2_Updates_IT.pdf
