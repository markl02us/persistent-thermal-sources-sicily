name: Bundle INGV PDFs
on:
  push:
    branches: [main]
    paths:
      - 'dist/pdf/*.pdf'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: verify pre-built PDFs are present
        run: |
          set -e
          shopt -s nullglob
          pdfs=(dist/pdf/*.pdf)
          if [ ${#pdfs[@]} -eq 0 ]; then
            echo "no PDFs found in dist/pdf/" >&2
            exit 1
          fi
          for f in "${pdfs[@]}"; do
            [ -s "$f" ] || { echo "empty: $f" >&2; exit 1; }
            echo "ok: $f ($(stat -c%s "$f") bytes)"
          done

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-ingv-pdfs
          path: dist/pdf/*.pdf
          retention-days: 90
